name: Generate Promo Image

on:
  push:
    branches: [master]
    paths:
      - "Screenshots/Community/Desktop/Light/Gallery_Default.png"
      - "Screenshots/Community/Mobile/Light/Gallery_Default.png"
      - "Scripts/make_promo.py"

jobs:
  build-promo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Pillow
        run: pip install pillow

      - name: Generate Promo Image
        run: |
          python3 Scripts/make_promo.py \
            Screenshots/Community/Desktop/Light/Gallery_Default.png \
            Screenshots/Community/Mobile/Light/Gallery_Default.png \
            Screenshots/Community/Promo.png

      - name: Commit Updated Promo Image
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Screenshots/Community/Promo.png
          git diff --cached --quiet || git commit -m "chore: Re-Generated the Promo Image"
          git push